<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Digizyn — Création de sites web et boutiques e-commerce sur mesure. Devis gratuit en 24h.">
<title>Digizyn — Création de sites web & e-commerce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563eb;--blue2:#3b82f6;--cyan:#06b6d4;
  --black:#06080f;--dark:#0d1117;--white:#f8faff;--gray:#94a3b8;
  --border:rgba(255,255,255,0.08);
  --ff:'Outfit',sans-serif;--fs:'Fraunces',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--black);color:var(--white);overflow-x:hidden}
.cur{width:10px;height:10px;background:var(--cyan);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.cur-ring{width:38px;height:38px;border:1px solid rgba(6,182,212,0.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .1s}
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:rgba(6,8,15,0.75);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--ff);font-size:22px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--white);text-decoration:none}
.logo span{color:var(--cyan)}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-size:13px;color:var(--gray);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-cta{font-family:var(--ff);font-size:13px;font-weight:600;padding:10px 26px;border-radius:6px;background:var(--blue);color:#fff;border:none;text-decoration:none;box-shadow:0 0 24px rgba(37,99,235,0.4);transition:all .2s}
.nav-cta:hover{background:var(--blue2);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="cur" id="cur"></div>
<nav>
  <a href="#" class="logo">DIGI<span>ZYN</span></a>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#tarifs">Tarifs</a></li>
    <li><a href="#faq">FAQ</a></li>
  </ul>
  <a href="brief.html" class="nav-cta">Démarrer un projet</a>
</nav>
</body>
</html>
